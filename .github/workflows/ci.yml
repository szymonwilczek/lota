name: Build and unit tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang llvm pkg-config \
            libelf-dev zlib1g-dev \
            libtss2-dev \
            libssl-dev libsystemd-dev libseccomp-dev \
            libdbus-1-dev

      - name: Install libbpf >= 1.0
        # Ubuntu 22.04 ships libbpf 0.5; 24.04 ships 1.3. The agent's
        # bpf_loader requires the libbpf 1.x API surface (kernel_log_level,
        # bpf_program__set_log_level, bpf_program__type). Pin to the same
        # stable libbpf release on every matrix entry so the CI toolchain
        # is deterministic instead of distro-version dependent.
        env:
          LIBBPF_VERSION: v1.4.6
        run: |
          set -eu
          sudo apt-get install -y --no-install-recommends git
          git clone --depth 1 --branch "$LIBBPF_VERSION" \
            https://github.com/libbpf/libbpf.git /tmp/libbpf
          make -C /tmp/libbpf/src -j"$(nproc)"
          sudo make -C /tmp/libbpf/src install \
            PREFIX=/usr LIBDIR=/usr/lib/x86_64-linux-gnu
          sudo ldconfig
          pkg-config --modversion libbpf

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: src/verifier/go.sum

      - name: Build all
        run: make all

      - name: Run unit tests
        run: make test-unit

  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format 22 from apt.llvm.org
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            wget gnupg ca-certificates lsb-release
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          codename="$(lsb_release -cs)"
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] \
          http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-22
          clang-format-22 --version

      - name: clang-format dry-run
        run: |
          set -eu
          mapfile -d '' files < <(find src include tests -type f \
            \( -name '*.c' -o -name '*.h' \) \
            ! -name 'vmlinux.h' -print0)
          clang-format-22 --dry-run --Werror "${files[@]}"

  examples:
    name: examples + setup.sh --dry-run
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        # same agent toolchain as the build job, + SDL2/libcurl
        # development headers for the examples binaries, and the
        # runtime helpers (curl CLI, swtpm, tpm2-tools) that
        # examples/demo/setup.sh probes via `need_cmd` even in
        # --dry-run mode
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang llvm pkg-config \
            libelf-dev zlib1g-dev \
            libtss2-dev \
            libssl-dev libsystemd-dev libseccomp-dev \
            libdbus-1-dev \
            libsdl2-dev libcurl4-openssl-dev \
            curl swtpm swtpm-tools tpm2-tools

      - name: Install libbpf >= 1.0
        env:
          LIBBPF_VERSION: v1.4.6
        run: |
          set -eu
          sudo apt-get install -y --no-install-recommends git
          git clone --depth 1 --branch "$LIBBPF_VERSION" \
            https://github.com/libbpf/libbpf.git /tmp/libbpf
          make -C /tmp/libbpf/src -j"$(nproc)"
          sudo make -C /tmp/libbpf/src install \
            PREFIX=/usr LIBDIR=/usr/lib/x86_64-linux-gnu
          sudo ldconfig

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: src/verifier/go.sum

      - name: Build SDK libraries
        # demo / block-demo binaries link against
        # build/liblotagaming.so + build/liblota_anticheat.so so the
        # SDK side has to land before make examples runs. `make all`
        # also produces the agent + verifier, which setup.sh --dry-run
        # references in its planned command list
        run: make all

      - name: Build examples (make examples)
        run: make examples

      - name: Validate examples/demo/setup.sh --dry-run
        # --no-build because make all already ran
        # --yes skips the interactive `read -r -p` prompts so the
        # dry run lays out the full seven-step plan without blocking.
        #
        # failure here means the demo's planned command list cannot
        # be assembled from the build artefacts that landed in this job,
        # or that one of the runtime helpers (curl / swtpm / tpm2-tools)
        # disappeared from the deps install
        run: |
          bash examples/demo/setup.sh --dry-run --no-build --yes

      - name: Verify block-demo artefacts exist
        # block-demo proves the BPF LSM strict_mmap gate at
        # runtime. CI cannot drive that path (no BPF attach in a
        # container), but it can assert the binaries are produced
        # so a regression in the fragment Makefile fails CI
        run: |
          test -x build/examples/block_victim
          test -f build/examples/evil.so

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Lint production shell scripts
        # operator-facing scripts (scripts/, examples/, tests/integration/,
        # src/initramfs/) are gated at severity=error. The fuzzing /
        # automation helpers under helper/ have their own quality tier
        # and are not part of the production install set; they stay out
        # of this gate on purpose
        run: |
          set -eu
          shellcheck -s bash -S error \
            scripts/setup-fsverity.sh \
            scripts/lota-steam-setup \
            scripts/lota-proton-hook \
            examples/demo/setup.sh \
            examples/demo/demo_tamper.sh \
            examples/block-demo/run.sh \
            examples/cs2/scenarios/verify-attested.sh \
            tests/integration/test_bpf_gates.sh \
            src/initramfs/90lota/module-setup.sh

  fedora-build:
    name: build-fedora-41
    runs-on: ubuntu-24.04
    container:
      image: fedora:41
    steps:
      - name: Install Fedora build dependencies
        run: |
          dnf -y install \
            git make gcc clang llvm pkgconf-pkg-config \
            libbpf-devel elfutils-libelf-devel zlib-devel \
            tpm2-tss-devel \
            openssl-devel systemd-devel libseccomp-devel \
            dbus-devel \
            golang

      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark workspace as a safe git directory
        # container runs as root, the checkout was performed
        # by a different uid in the actions/checkout step; git's
        # safe.directory guard refuses operations on the worktree
        # without this. Scoped to the workspace, not '*'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build all
        run: make all

      - name: Run unit tests
        run: make test-unit

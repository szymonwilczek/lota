name: Go static analysis

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/verifier
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: src/verifier/go.sum

      - name: Verify go.mod is tidy
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          for mod in src/verifier src/sdk/server; do
            (cd "$mod" && go mod tidy)
          done
          if ! git diff --exit-code -- '**/go.mod' '**/go.sum'; then
            echo "go.mod/go.sum out of sync with sources -- run 'go mod tidy' locally" >&2
            exit 1
          fi

      - name: Run Go tests
        run: go test ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: src/verifier
          args: --config ../../.golangci.yml ./...

  go-coverage:
    name: go-coverage-ratchet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/verifier/go.mod
          cache-dependency-path: src/verifier/go.sum

      - name: Coverage ratchet
        # Fails if any Go package drops below its recorded floor in
        # .github/go-coverage-baseline. Raise the floors as tests land;
        # the target is 100%.
        run: ./scripts/check-go-coverage.sh
